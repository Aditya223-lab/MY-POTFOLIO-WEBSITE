# Local PostgreSQL database for development.
# Start it with:  npm run db:start
# Stop it with:   npm run db:stop
services:
  db:
    image: postgres:16
    container_name: portfolio-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
      POSTGRES_DB: portfolio
    ports:
      - "5432:5432"
    volumes:
      - portfolio-pgdata:/var/lib/postgresql/data

volumes:
  portfolio-pgdata:
